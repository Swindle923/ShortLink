services:
  test-report-ui:
    image: nginx:alpine
    container_name: shortlink-test-report-ui
    restart: unless-stopped
    ports:
      - "${TEST_REPORT_PORT:-8099}:80"
    volumes:
      - ./testing/reports:/usr/share/nginx/html:ro

  test-newman:
    image: postman/newman:alpine
    container_name: shortlink-test-newman
    working_dir: /etc/newman
    volumes:
      - ./testing:/etc/newman
    entrypoint: ["sh", "-c", "sleep infinity"]

  test-k6:
    image: grafana/k6:latest
    container_name: shortlink-test-k6
    working_dir: /workspace
    volumes:
      - ./testing:/workspace
    entrypoint: ["sh", "-c", "sleep infinity"]
