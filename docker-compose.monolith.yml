services:
  mysql:
    image: mysql:8.0
    container_name: shortlink-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-link}
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: shortlink-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}" ]
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: shortlink-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shortlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortlink}
      POSTGRES_DB: ${POSTGRES_DB:-shortlink}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mysql_data:
  redis_data:
  postgres_data:
