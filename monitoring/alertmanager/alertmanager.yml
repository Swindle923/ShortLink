global:
  resolve_timeout: 5m

route:
  receiver: shortlink-default
  group_by: [alertname, severity]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 2h

receivers:
  - name: shortlink-default
    webhook_configs:
      - url: http://host.docker.internal:18080/alert
        send_resolved: true
