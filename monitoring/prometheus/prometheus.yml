global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: shortlink
    env: local

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: shortlink
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8003
        labels:
          service: shortlink

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
